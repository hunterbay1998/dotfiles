# =============================
# HYPRLAND MAIN CONFIG
# =============================

# =============================
# MONITORS
# =============================

monitor=eDP-1,preferred,auto,2

# =============================
# VARIABLES
# =============================

$terminal = kitty
$fileManager = thunar
$menu = hyprlauncher
$mainMod = SUPER

#############################
### ENVIRONMENT VARIABLES ###
#############################


env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_DATA_DIRS,/home/bailey/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share


#these require sudo pacman ibus
env = GTK_IM_MODULE,ibus
env = QT_IM_MODULE,ibus
env = XMODIFIERS,@im=ibus
env = GDK_SCALE,2

#for hyprltm-net
env = PATH,$PATH:/home/bailey/.local/bin

#laptop amd graphix
env = WLR_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0

# =============================
# INPUT
# =============================

input {
    kb_layout = gb,us
    kb_variant = ,colemak
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
        tap-to-click = true
        clickfinger_behavior = true
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# =============================
# DECORATION
# =============================

decoration {
    rounding = 5
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 20
        render_power = 2
        color = rgba(00000055)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.1696
        new_optimizations = true
    }
}

# =============================
# ANIMATIONS
# =============================

animations {
    enabled = yes

    bezier = snap, 0.05, 0.9, 0.1, 1
    bezier = snapOut, 0.05, 0.7, 0.1, 1

    animation = windows, 1, 3, snap, popin 90%
    animation = windowsIn, 1, 3, snap, popin 90%
    animation = windowsOut, 1, 2, snapOut, popin 90%
    animation = border, 1, 4, snap
    animation = fade, 1, 3, snap
    animation = fadeIn, 1, 2, snap
    animation = fadeOut, 1, 2, snapOut
    animation = layers, 1, 2, snap, fade
    animation = layersIn, 1, 2, snap, fade
    animation = layersOut, 1, 1, snapOut, fade
    animation = workspaces, 1, 3, snap, slide
    animation = workspacesIn, 1, 3, snap, slide
    animation = workspacesOut, 1, 3, snapOut, slide
}

# =============================
# GENERAL / MISC
# =============================

general {
    gaps_in = 3
    gaps_out = 15

    border_size = 1

    col.active_border = rgba(565f89aa)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
    resize_on_border = true
}

general {
  no_focus_fallback = true
}


misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

xwayland {
    force_zero_scaling = true
}

# =============================
# KEYBINDS
# =============================

# -----------------------------
# Layout toggle (QWERTY gb / Colemak)
# -----------------------------
bind = $mainMod, grave, exec, hyprctl switchxkblayout all next

# -----------------------------
# Main apps
# -----------------------------
bind = $mainMod, return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind =  CTRL, E, exec, $fileManager
bind = $mainMod, D, exec, $menu
#bind = $mainMod, space, exec, ags toggle launcher
bind = $mainMod, space, exec, rofi -show drun
bind = $mainMod, N, exec, hyprltm-net
bind = $mainMod, E, exec, kitty -e yazi
bind = $mainMod, I, exec, kitty --title btop -e btop


# Pinned popup window
bind = $mainMod, S, exec, sh -c "hyprctl dispatch togglefloating; sleep 0.05; hyprctl dispatch resizeactive exact 600 400; hyprctl dispatch centerwindow; hyprctl dispatch pin"
# -----------------------------
# Window control
# -----------------------------
bind = $mainMod, V, exec, sh -c "hyprctl dispatch togglefloating; hyprctl dispatch centerwindow; hyprctl dispatch resizeactive exact 900 600"
bind = $mainMod, F, fullscreen,
bind = $mainMod, P, pseudo,
bind = $mainMod, T, layoutmsg, togglesplit
bind = $mainMod, X, layoutmsg, swapsplit
#bind = $mainMod, B, exec, pkill waybar || waybar
bind = $mainMod, U, exec, ags toggle bar
bind = $mainMod SHIFT, A, exec, sh -c 'ags quit || ags run ~/.config/ags/app.ts'

# -----------------------------
# Focus navigation (vim style)
# -----------------------------
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# -----------------------------
# Move windows (vim style)
# -----------------------------
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Swap windows
bind = $mainMod ALT, H, swapwindow, l
bind = $mainMod ALT, L, swapwindow, r
bind = $mainMod ALT, K, swapwindow, u
bind = $mainMod ALT, J, swapwindow, d

# -----------------------------
# Resize windows (vim style)
# -----------------------------
bind = $mainMod, R, submap, resize

submap = resize
binde = , H, resizeactive, -20 0
binde = , L, resizeactive, 20 0
binde = , K, resizeactive, 0 -20
binde = , J, resizeactive, 0 20

# exit resize mode
bind = , escape, submap, reset
submap = reset

# -----------------------------
# Workspaces
# -----------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# -----------------------------
# Mouse (move + resize)
# -----------------------------
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -----------------------------
# Screenshot
# -----------------------------
bind = ,Print,exec,sh -c 'file="$HOME/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png"; grim -g "$(slurp)" "$file" && notify-send -a Screenshot -i camera-photo "Screenshot saved" "$file"'

# -----------------------------
# Volume / Brightness
# -----------------------------
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# -----------------------------
# Media
# -----------------------------
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

# =============================
# AUTOSTART
# =============================
exec-once = hyprpaper
exec-once = ags run ~/.config/ags/app.ts
exec-once = nm-applet
exec-once = blueman-applet
exec-once = $terminal
exec-once = hypridle
exec-once = swaync

# HyprMod managed settings
source = /home/bailey/.config/hypr/hyprland-gui.conf
